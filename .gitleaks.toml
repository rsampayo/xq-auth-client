# gitleaks config — extends the default ruleset with XQ false-positive allowlists.
# gitleaks auto-loads this file from the repo root (no --config flag needed).
[extend]
useDefault = true

[allowlist]
description = "XQ allowlist: variable assignments + test fixtures (not real secrets)"
# Matched against the finding's captured secret.
regexes = [
  # `self._hs_secret = legacy_hs256_secret` — assigns a constructor param, not a literal.
  '''legacy_hs256_secret''',
]
# Synthetic keys/JWKs used by the JWKS validator tests are fixtures, not real secrets.
paths = [
  '''(^|/)tests?/''',
]
